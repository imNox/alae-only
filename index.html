<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Pinyon+Script&family=Alex+Brush&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08000f;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;font-family:'Dancing Script',cursive}
.stage{width:600px;height:600px;position:relative;overflow:hidden;margin:0 auto;background:radial-gradient(ellipse at 50% 30%,#1a0520 0%,#0d0118 40%,#050008 100%)}
.layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity 1.8s ease}
.layer.hidden{opacity:0;pointer-events:none}
.layer.visible{opacity:1}

/* === PARTICLE SYSTEMS === */
.particles-wrap{position:absolute;inset:0;pointer-events:none;z-index:2}

/* === PHASE 1 ENVELOPE === */
.env-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:5;position:relative}
.envelope{width:260px;height:180px;position:relative;filter:drop-shadow(0 24px 48px rgba(255,160,200,0.35));animation:envFloat 3.5s ease-in-out infinite}
@keyframes envFloat{0%,100%{transform:translateY(0) rotate(-0.8deg)}50%{transform:translateY(-14px) rotate(0.8deg)}}
.env-body{position:absolute;inset:0;background:linear-gradient(145deg,#fce8f0,#f8d0e0,#f0b8cc);border-radius:6px;border:1px solid rgba(220,120,160,0.4)}
.env-flap{position:absolute;top:0;left:0;right:0;height:95px;clip-path:polygon(0 0,50% 58%,100% 0);background:linear-gradient(155deg,#f8d0e0,#e8a8c0);transform-origin:top;transition:transform 1.4s cubic-bezier(.22,1,.36,1);z-index:3}
.env-flap.open{transform:rotateX(-175deg)}
.env-bl{position:absolute;bottom:0;left:0;right:0;height:62px;clip-path:polygon(0 100%,50% 22%,100% 100%);background:linear-gradient(to top,#e8a8c0,#f8d0e0)}
.env-ll{position:absolute;left:0;top:0;bottom:0;width:50%;clip-path:polygon(0 0,100% 42%,100% 58%,0 100%);background:rgba(220,130,155,0.12)}
.env-rl{position:absolute;right:0;top:0;bottom:0;width:50%;clip-path:polygon(0 42%,100% 0,100% 100%,0 58%);background:rgba(220,130,155,0.12)}
.env-seal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:radial-gradient(circle at 35% 35%,#e05585,#8b0030);border-radius:50%;z-index:4;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.9);font-size:13px;box-shadow:0 3px 12px rgba(139,0,48,0.4)}
.env-for{font-family:'Pinyon Script',cursive;font-size:28px;color:rgba(255,210,225,0.75);text-shadow:0 0 30px rgba(255,160,200,0.5);letter-spacing:1px;animation:softPulse 3s ease-in-out infinite}
@keyframes softPulse{0%,100%{opacity:0.75}50%{opacity:1}}

/* === PHASE 2 LETTER === */
.letter-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
.paper{width:100%;height:100%;background:linear-gradient(160deg,#fffcfa,#fff8f4,#fff5f0);border-radius:3px;padding:28px 26px 22px;box-shadow:0 8px 32px rgba(0,0,0,0.25),0 0 80px rgba(230,100,140,0.12),inset 0 0 40px rgba(255,210,220,0.08);border:1px solid rgba(210,170,185,0.3);position:relative;overflow:hidden;display:flex;flex-direction:column}
.paper::before{content:'';position:absolute;left:44px;top:0;bottom:0;width:1px;background:rgba(220,160,180,0.2)}
.paper-lines{position:absolute;inset:28px 0 0;background-image:repeating-linear-gradient(to bottom,transparent,transparent 29px,rgba(210,175,185,0.13) 29px,rgba(210,175,185,0.13) 30px);pointer-events:none}
.letter-greet{font-family:'Pinyon Script',cursive;font-size:22px;color:#2a1520;line-height:1.6;min-height:30px;transform:rotate(-1.2deg);display:block;margin-bottom:6px}
.letter-body{font-family:'Dancing Script',cursive;font-size:15.5px;color:#1e0f18;line-height:30px;white-space:pre-line;transform:rotate(-0.8deg);flex:1}
.letter-close{font-family:'Pinyon Script',cursive;font-size:21px;color:#2a1520;text-align:right;transform:rotate(-1.2deg);display:block;margin-top:8px}

/* === PHASE 3 CHERRY BLOSSOM TRANSITION === */
.cherry-overlay{position:absolute;inset:0;z-index:20;pointer-events:none}

/* === PHASE 4 PHOTOS === */
.photo-stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.photo-card{position:absolute;width:340px;height:340px;border-radius:20px;overflow:hidden;box-shadow:0 0 60px rgba(255,160,200,0.4),0 0 120px rgba(255,160,200,0.15),0 30px 60px rgba(0,0,0,0.5);border:2px solid rgba(255,190,215,0.35);opacity:0;transform:scale(0.88) translateY(20px);transition:opacity 1.4s ease,transform 1.4s cubic-bezier(.22,1,.36,1)}
.photo-card.show{opacity:1;transform:scale(1) translateY(0);animation:photoFloat 5s ease-in-out infinite}
.photo-card img{width:100%;height:100%;object-fit:cover}
@keyframes photoFloat{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.015) translateY(-8px)}}
.photo-lbl{position:absolute;bottom:28px;left:0;right:0;text-align:center;font-family:'Pinyon Script',cursive;font-size:26px;color:rgba(255,220,235,0.9);text-shadow:0 0 20px rgba(255,120,170,0.7),0 2px 8px rgba(0,0,0,0.5)}

/* === PHASE 5 MIDNIGHT ENDING === */
.moon{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#fff9e6,#ffedb0,#ffd878);box-shadow:0 0 40px rgba(255,220,120,0.6),0 0 100px rgba(255,200,80,0.25),0 0 200px rgba(255,180,60,0.1);top:60px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity 2s ease}
.moon.show{opacity:1}
.ending-txt{font-family:'Pinyon Script',cursive;font-size:44px;color:transparent;background:linear-gradient(135deg,#ffe68a,#ffd060,#ffb830,#ffd060,#ffe68a);-webkit-background-clip:text;background-clip:text;text-align:center;line-height:1.3;padding:0 30px;transform:rotate(-1.5deg);filter:drop-shadow(0 0 24px rgba(255,210,80,0.5));min-height:60px}
.ending-sub{font-family:'Alex Brush',cursive;font-size:18px;color:rgba(255,220,200,0.65);letter-spacing:3px;margin-top:14px;text-align:center}
.heart-pulse{font-size:26px;animation:hb 1.6s ease-in-out infinite;display:block;text-align:center;margin:12px 0;filter:drop-shadow(0 0 12px rgba(255,80,120,0.7))}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

/* progress */
.prog{position:absolute;bottom:0;left:0;height:2px;background:linear-gradient(90deg,rgba(220,80,130,0),rgba(255,160,200,0.7));z-index:99;transition:width .1s linear}
.phase-lbl{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:'Dancing Script',cursive;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,200,220,0.4);z-index:50;white-space:nowrap}
</style>

<div class="stage" id="stage">
<!-- BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>








  <canvas id="particleCanvas" style="position:absolute;inset:0;z-index:1;pointer-events:none"></canvas>
  <div class="phase-lbl" id="phaseLbl">A letter for you</div>
  <div class="prog" id="prog"></div>

  <!-- P1 Envelope -->
  <div class="layer visible" id="p1" style="z-index:10">
    <div class="env-wrap">
      <div class="envelope" id="envWrap">
        <div class="env-body">
          <div class="env-ll"></div><div class="env-rl"></div><div class="env-bl"></div>
        </div>
        <div class="env-flap" id="envFlap">
          <div class="env-seal">&#10022;</div>
        </div>
      </div>
      <div class="env-for">For my love&hellip;</div>
    </div>
  </div>

  <!-- P2 Letter -->
  <div class="layer hidden" id="p2" style="z-index:8">
    <div class="letter-wrap">
      <div class="paper">
        <div class="paper-lines"></div>
        <span class="letter-greet" id="lg"></span>
        <div class="letter-body" id="lb"></div>
        <span class="letter-close" id="lc"></span>
      </div>
    </div>
  </div>

<!-- Cherry overlay canvas -->
  <canvas id="cherryCanvas" style="position:absolute;inset:0;z-index:15;pointer-events:none;opacity:0"></canvas>
</div>

<script>
const W=600,H=600;
const stage=document.getElementById('stage');
const pCvs=document.getElementById('particleCanvas');
const pCtx=pCvs.getContext('2d');
pCvs.width=W;pCvs.height=H;
const cCvs=document.getElementById('cherryCanvas');
const cCtx=cCvs.getContext('2d');
cCvs.width=W;cCvs.height=H;

// ---- AMBIENT PARTICLES (always running) ----
const ambients=[];
for(let i=0;i<55;i++){
  ambients.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*2+0.5,
    vx:(Math.random()-0.5)*0.3,vy:-(Math.random()*0.4+0.1),
    life:Math.random(),lifeSpd:Math.random()*0.003+0.001,
    hue:Math.random()<0.5?330:45
  });
}
function drawAmbients(){
  pCtx.clearRect(0,0,W,H);
  ambients.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life+=p.lifeSpd;
    if(p.life>1){p.life=0;p.x=Math.random()*W;p.y=H+10;}
    const alpha=Math.sin(p.life*Math.PI)*0.7;
    pCtx.beginPath();
    pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fillStyle=`hsla(${p.hue},80%,80%,${alpha})`;
    pCtx.fill();
  });
}

// ---- STAR PARTICLES for ending ----
const stars=[];
for(let i=0;i<140;i++){
  stars.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.8+0.3,
    twinkle:Math.random()*Math.PI*2,
    twinkleSpd:Math.random()*0.02+0.008,
    baseAlpha:Math.random()*0.6+0.3
  });
}
let showStars=false;
function drawStars(ctx){
  stars.forEach(s=>{
    s.twinkle+=s.twinkleSpd;
    const a=s.baseAlpha*(0.5+0.5*Math.sin(s.twinkle));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,245,220,${a})`;ctx.fill();
  });
}

// ---- CHERRY BLOSSOMS ----
const petals=[];
let cherryPhase='off'; // 'in','peak','out'
let cherryAlpha=0;

function makePetal(){
  return{
    x:Math.random()*W,y:-20-Math.random()*60,
    vx:(Math.random()-0.5)*1.8,vy:Math.random()*1.8+0.8,
    rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-0.5)*0.06,
    size:Math.random()*9+6,
    swing:Math.random()*Math.PI*2,swingSpd:Math.random()*0.03+0.01,
    alpha:Math.random()*0.5+0.5,
    hue:Math.random()<0.6?345:320
  };
}
for(let i=0;i<80;i++){
  const p=makePetal();p.y=Math.random()*H;petals.push(p);
}

function drawPetal(ctx,p){
  ctx.save();
  ctx.translate(p.x,p.y);ctx.rotate(p.rot);
  ctx.beginPath();
  ctx.ellipse(0,0,p.size*0.55,p.size,0,0,Math.PI*2);
  const g=ctx.createRadialGradient(0,-p.size*0.3,0,0,0,p.size);
  g.addColorStop(0,`hsla(${p.hue},90%,92%,${p.alpha})`);
  g.addColorStop(0.6,`hsla(${p.hue},80%,82%,${p.alpha*0.85})`);
  g.addColorStop(1,`hsla(${p.hue},70%,75%,0)`);
  ctx.fillStyle=g;ctx.fill();
  ctx.restore();
}

function updatePetals(){
  petals.forEach(p=>{
    p.swing+=p.swingSpd;
    p.x+=p.vx+Math.sin(p.swing)*0.6;
    p.y+=p.vy;p.rot+=p.rotSpd;
    if(p.y>H+30){Object.assign(p,makePetal());}
  });
}

// ---- MAIN RENDER LOOP ----
let frame=0;
function loop(){
  requestAnimationFrame(loop);
  frame++;
  drawAmbients();

  // Cherry overlay
  if(cherryPhase!=='off'){
    cCtx.clearRect(0,0,W,H);
    if(showStars){
      // dark bg for ending
      const endAlpha=Math.min(cherryAlpha,0.95);
      cCtx.fillStyle=`rgba(4,0,14,${endAlpha})`;
      cCtx.fillRect(0,0,W,H);
      drawStars(cCtx);
    }
    cCtx.globalAlpha=cherryAlpha;
    updatePetals();
    petals.forEach(p=>drawPetal(cCtx,p));
    cCtx.globalAlpha=1;
  } else {
    cCtx.clearRect(0,0,W,H);
  }
}
loop();

// ---- PHASE CONTROLLER ----
function show(id){
  const el=document.getElementById(id);
  el.classList.remove('hidden');
  requestAnimationFrame(()=>el.classList.add('visible'));
}
function hide(id,cb){
  const el=document.getElementById(id);
  el.classList.remove('visible');
  el.classList.add('hidden');
  setTimeout(()=>{if(cb)cb();},1900);
}
function crossfade(fromId,toId,cb){
  hide(fromId,()=>{show(toId);if(cb)setTimeout(cb,400);});
}

// ---- TYPEWRITER ----
function type(el,txt,spd,cb){
  let i=0;el.textContent='';
  function t(){
    if(i<txt.length){el.textContent+=txt[i++];setTimeout(t,spd+Math.random()*spd*0.25);}
    else if(cb)cb();
  }t();
}

// ---- PHOTO SLIDESHOW ----
function runPhotos(cb){
  document.getElementById('phaseLbl').textContent='Our moments together';
  const cards=['pc1','pc2','pc3'];
  let cur=0;
  function showCard(i){
    const el=document.getElementById(cards[i]);
    el.classList.add('show');
    if(i>0){
      const prev=document.getElementById(cards[i-1]);
      prev.style.transition='opacity 1.2s ease,transform 1.2s ease';
      prev.style.opacity='0';prev.style.transform='scale(0.9) translateY(-20px)';
    }
    if(i<cards.length-1)setTimeout(()=>showCard(i+1),3800);
    else setTimeout(()=>{
      // fade out last card then call cb
      const last=document.getElementById(cards[i]);
      last.style.transition='opacity 1.4s ease';last.style.opacity='0';
      setTimeout(cb,1500);
    },3800);
  }
  showCard(0);
}

// ---- CHERRY FADE HELPER ----
function animAlpha(target,spd,onDone){
  function step(){
    const diff=target-cherryAlpha;
    if(Math.abs(diff)<0.005){cherryAlpha=target;if(onDone)onDone();return;}
    cherryAlpha+=diff*spd;
    cCvs.style.opacity='1';
    requestAnimationFrame(step);
  }step();
}

// ---- PROGRESS ----
const prog=document.getElementById('prog');
const TOTAL=75000;
const t0=Date.now();
(function tickProg(){
  const e=Date.now()-t0;
  prog.style.width=Math.min(e/TOTAL*100,100)+'%';
  if(e<TOTAL)requestAnimationFrame(tickProg);
})();
